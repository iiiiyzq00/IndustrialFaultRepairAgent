# =============================================================================
# Redis / Middleware Mock Scenarios
# =============================================================================

global_config:
  config:
    maxmemory-policy: "noeviction"
    maxmemory: "10Gi"
    save: "900 1 300 10"
    appendonly: "yes"
  info:
    redis_version: "7.2.0"
    uptime_in_seconds: 2592000
    connected_clients: 48
    used_memory_human: "8.2Gi"
    used_memory_peak_human: "9.5Gi"
    total_commands_processed: 158320000
    instantaneous_ops_per_sec: 850
    keyspace_hits: 142000000
    keyspace_misses: 8200000

scenarios:
  # ---------------------------------------------------------------------------
  # default — healthy Redis
  # ---------------------------------------------------------------------------
  default:
    slowlog: []
    info:
      instantaneous_ops_per_sec: 850
      latest_fork_usec: 1200

  # ---------------------------------------------------------------------------
  # slow_query — KEYS * blocking Redis (maps to real-world incident)
  # ---------------------------------------------------------------------------
  slow_query:
    slowlog:
      - id: 1234
        timestamp: "2025-06-15T02:33:05Z"
        duration_us: 1520000
        command: "KEYS *"
        client_ip: "10.0.1.5"
        client_name: "order-svc-7f3a"
      - id: 1233
        timestamp: "2025-06-15T02:33:02Z"
        duration_us: 1480000
        command: "KEYS *"
        client_ip: "10.0.1.5"
        client_name: "order-svc-7f3a"
      - id: 1232
        timestamp: "2025-06-15T02:32:58Z"
        duration_us: 1350000
        command: "KEYS *"
        client_ip: "10.0.1.5"
        client_name: "order-svc-7f3a"
      - id: 1231
        timestamp: "2025-06-15T02:32:55Z"
        duration_us: 1620000
        command: "KEYS *"
        client_ip: "10.0.1.5"
        client_name: "order-svc-8g2b"
      - id: 1230
        timestamp: "2025-06-15T02:32:50Z"
        duration_us: 1410000
        command: "KEYS *"
        client_ip: "10.0.1.5"
        client_name: "order-svc-8g2b"
      - id: 1229
        timestamp: "2025-06-15T02:32:45Z"
        duration_us: 1280000
        command: "KEYS order:cache:*"
        client_ip: "10.0.1.5"
        client_name: "order-svc-7f3a"
      - id: 1228
        timestamp: "2025-06-15T02:32:40Z"
        duration_us: 1150000
        command: "HGETALL order:session:*"
        client_ip: "10.0.1.8"
        client_name: "payment-svc-3k1c"
      - id: 1227
        timestamp: "2025-06-15T02:32:30Z"
        duration_us: 950000
        command: "SCAN 0 MATCH order:* COUNT 1000"
        client_ip: "10.0.1.5"
        client_name: "order-svc-7f3a"
    config:
      maxmemory-policy: "noeviction"
      maxmemory: "10Gi"
    info:
      instantaneous_ops_per_sec: 12
      latest_fork_usec: 8500000
      blocked_clients: 47
      used_memory_human: "9.4Gi"

  # ---------------------------------------------------------------------------
  # memory_pressure — Redis near OOM
  # ---------------------------------------------------------------------------
  memory_pressure:
    slowlog:
      - id: 2200
        timestamp: "2025-06-15T08:15:00Z"
        duration_us: 850000
        command: "SADD events:recent ..."
        client_ip: "10.0.2.1"
        client_name: "analytics-svc-1a2b"
    config:
      maxmemory-policy: "noeviction"
      maxmemory: "10Gi"
    info:
      instantaneous_ops_per_sec: 210
      used_memory_human: "9.8Gi"
      used_memory_peak_human: "9.9Gi"
      evicted_keys: 12000

  # ---------------------------------------------------------------------------
  # connection_storm — too many client connections
  # ---------------------------------------------------------------------------
  connection_storm:
    slowlog: []
    config:
      maxclients: "10000"
    info:
      connected_clients: 9850
      rejected_connections: 340
      instantaneous_ops_per_sec: 45

  # ---------------------------------------------------------------------------
  # maxmemory_eviction — reached maxmemory, keys being evicted
  # ---------------------------------------------------------------------------
  maxmemory_eviction:
    slowlog:
      - id: 2001
        timestamp: "2025-06-15T14:00:05Z"
        duration_us: 5000
        command: "SET order:10293:status completed EX 3600"
        client_ip: "10.0.1.5"
        client_name: "order-svc-7f3a"
    config:
      maxmemory: "4gb"
      maxmemory-policy: "allkeys-lru"
      maxclients: "10000"
    info:
      redis_version: "7.2.0"
      uptime_in_seconds: 864000
      connected_clients: 320
      used_memory_human: "3.98Gi"
      used_memory_peak_human: "4.00Gi"
