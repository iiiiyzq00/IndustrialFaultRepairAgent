# =============================================================================
# K8s Mock Scenarios
# =============================================================================
#
# Each scenario defines the data returned by the K8s mock API endpoints.
# Active scenario can be switched at runtime via:
#   POST /scenario/{name}
# =============================================================================

global_config:
  resource_quota:
    cpu_limit: "10"
    cpu_used: "4.5"
    mem_limit: "32Gi"
    mem_used: "14Gi"

scenarios:
  # ---------------------------------------------------------------------------
  # default — healthy cluster
  # ---------------------------------------------------------------------------
  default:
    pods:
      - name: "order-svc-7f3a"
        namespace: "prod"
        status: "Running"
        ready: true
        restarts: 0
        cpu_m: "320m"
        memory: "0.8Gi"
        node: "node-03"
        version: "v2.3.0"
      - name: "order-svc-8g2b"
        namespace: "prod"
        status: "Running"
        ready: true
        restarts: 0
        cpu_m: "280m"
        memory: "0.7Gi"
        node: "node-04"
        version: "v2.3.0"
      - name: "payment-svc-3k1c"
        namespace: "prod"
        status: "Running"
        ready: true
        restarts: 0
        cpu_m: "150m"
        memory: "0.5Gi"
        node: "node-03"
        version: "v1.8.0"
      - name: "redis-prod-01"
