        status: "Running"
        ready: true
        restarts: 0
        cpu_m: "600m"
        memory: "4.2Gi"
        node: "node-05"
        version: "7.2.0"
    events: []
    deploy_history:
      - version: "v2.3.0"
        deployed_at: "2025-06-10T14:00:00Z"
        image: "order-svc:v2.3.0"
        trigger: "CI-CD"
        status: "active"
      - version: "v2.2.1"
        deployed_at: "2025-06-03T10:30:00Z"
        image: "order-svc:v2.2.1"
        trigger: "CI-CD"
        status: "superseded"
    node_metrics:
      node-03:
        cpu: "35%"
        mem: "45%"
        disk_io: "80MB/s"
      node-04:
        cpu: "28%"
        mem: "38%"
        disk_io: "60MB/s"
      node-05:
        cpu: "52%"
        mem: "62%"
        disk_io: "120MB/s"

  # ---------------------------------------------------------------------------
  # oom — Pod OOMKilled after new deployment
  # ---------------------------------------------------------------------------
  oom:
    pods:
      - name: "order-svc-7f3a"
        namespace: "prod"
        status: "OOMKilled"
        ready: false
        restarts: 15
        cpu_m: "1950m"
        memory: "3.9Gi"
        node: "node-03"
        version: "v2.4.0"
      - name: "order-svc-8g2b"
        namespace: "prod"
        status: "OOMKilled"
        ready: false
        restarts: 12
        cpu_m: "1900m"
        memory: "3.8Gi"
        node: "node-04"
        version: "v2.4.0"
      - name: "payment-svc-3k1c"
        namespace: "prod"
        status: "Running"
        ready: true
        restarts: 0
        cpu_m: "150m"
        memory: "0.5Gi"
        node: "node-03"
        version: "v1.8.0"
    events:
      - time: "2025-06-15T02:33:10Z"
        type: "Warning"
        reason: "OOMKilled"
        message: "Container order-svc exceeded memory limit of 4Gi"
        pod: "order-svc-7f3a"
      - time: "2025-06-15T02:33:15Z"
        type: "Warning"
        reason: "OOMKilled"
        message: "Container order-svc exceeded memory limit of 4Gi"
        pod: "order-svc-8g2b"
      - time: "2025-06-15T02:33:20Z"
        type: "Warning"
        reason: "BackOff"
        message: "Back-off restarting failed container"
        pod: "order-svc-7f3a"
    deploy_history:
      - version: "v2.4.0"
        deployed_at: "2025-06-15T02:00:00Z"
        image: "order-svc:v2.4.0"
        trigger: "CI-CD"
        status: "active"
      - version: "v2.3.0"
        deployed_at: "2025-06-10T14:00:00Z"
        image: "order-svc:v2.3.0"
        trigger: "CI-CD"
        status: "superseded"
    resource_quota:
      cpu_limit: "10"
      cpu_used: "9.8"
      mem_limit: "32Gi"
      mem_used: "31Gi"
    node_metrics:
      node-03:
        cpu: "94%"
        mem: "97%"
        disk_io: "350MB/s"
      node-04:
        cpu: "92%"
        mem: "95%"
        disk_io: "320MB/s"
      node-05:
        cpu: "55%"
        mem: "65%"
        disk_io: "130MB/s"

  # ---------------------------------------------------------------------------
  # crash_loop — Pod stuck in CrashLoopBackOff
  # ---------------------------------------------------------------------------
  crash_loop:
    pods:
      - name: "inventory-svc-2x9p"
        namespace: "prod"
        status: "CrashLoopBackOff"
        ready: false
        restarts: 42
        cpu_m: "0m"
        memory: "0Gi"
        node: "node-02"
        version: "v3.1.0"
      - name: "inventory-svc-7y4q"
        namespace: "prod"
        status: "CrashLoopBackOff"
        ready: false
        restarts: 38
        cpu_m: "0m"
        memory: "0Gi"
        node: "node-03"
        version: "v3.1.0"
    events:
      - time: "2025-06-15T04:10:05Z"
        type: "Warning"
        reason: "CrashLoopBackOff"
        message: "Container crashed on startup: java.lang.NoClassDefFoundError"
        pod: "inventory-svc-2x9p"
    deploy_history:
      - version: "v3.1.0"
        deployed_at: "2025-06-15T04:05:00Z"
        image: "inventory-svc:v3.1.0"
        trigger: "CI-CD"
        status: "active"
      - version: "v3.0.0"
        deployed_at: "2025-06-08T09:00:00Z"
        image: "inventory-svc:v3.0.0"
        trigger: "CI-CD"
        status: "superseded"
    node_metrics:
      node-02:
        cpu: "42%"
        mem: "55%"
        disk_io: "200MB/s"
      node-03:
        cpu: "40%"
        mem: "50%"
        disk_io: "180MB/s"

  # ---------------------------------------------------------------------------
  # crash_loop_backoff — Pod CrashLoopBackOff with init failure
  # ---------------------------------------------------------------------------
  crash_loop_backoff:
    pods:
      - name: "notification-svc-4f2k"
        namespace: "prod"
        status: "CrashLoopBackOff"
        ready: false
        restarts: 67
        cpu_m: "0m"
        memory: "0Gi"
        node: "node-04"
        version: "v2.0.1"
    events:
      - time: "2025-06-15T06:22:10Z"
        type: "Warning"
        reason: "CrashLoopBackOff"
        message: "Back-off restarting failed container: liveness probe failed after 3 attempts"
        pod: "notification-svc-4f2k"
      - time: "2025-06-15T06:21:50Z"
        type: "Warning"
        reason: "Unhealthy"
        message: "Liveness probe failed: Get http://10.244.1.15:8080/health: dial tcp 10.244.1.15:8080: connect: connection refused"
        pod: "notification-svc-4f2k"
    deploy_history:
      - version: "v2.0.1"
        deployed_at: "2025-06-15T06:20:00Z"
        image: "notification-svc:v2.0.1"
        trigger: "Manual"
        status: "active"
    node_metrics:
      node-04:
        cpu: "25%"
        mem: "35%"
        disk_io: "40MB/s"

  # ---------------------------------------------------------------------------
  # image_pull_backoff — ErrImagePull / ImagePullBackOff
  # ---------------------------------------------------------------------------
  image_pull_backoff:
