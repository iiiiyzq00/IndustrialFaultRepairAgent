        message: "Failed to pull image \"analytics-svc:v5.0.0-beta\": rpc error: code = NotFound desc = manifest not found"
        pod: "analytics-svc-9j3h"
      - time: "2025-06-15T07:11:00Z"
        type: "Warning"
        reason: "Failed"
        message: "Error: ErrImagePull"
        pod: "analytics-svc-9j3h"
      - time: "2025-06-15T07:12:00Z"
        type: "Warning"
        reason: "Failed"
