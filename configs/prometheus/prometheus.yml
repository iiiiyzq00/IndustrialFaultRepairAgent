# =============================================================================
# Prometheus Configuration — Industrial Fault Repair Multi-Agent System
# =============================================================================
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: "agent-supervisor"
    metrics_path: /metrics
    static_configs:
      - targets: ["agent-supervisor:8100"]

  - job_name: "expert-workers"
    metrics_path: /metrics
    static_configs:
      - targets:
          - "k8s-expert:8110"
          - "middleware-expert:8120"
          - "network-expert:8130"
          - "app-expert:8140"

  - job_name: "rag-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["rag-service:8200"]

  - job_name: "hitl-gateway"
    metrics_path: /metrics
    static_configs:
      - targets: ["hitl-gateway:8300"]

  - job_name: "sandbox-service"
    metrics_path: /health
    static_configs:
      - targets: ["sandbox-service:8500"]

  - job_name: "action-executor"
    metrics_path: /health
    static_configs:
      - targets: ["action-executor:8400"]

  - job_name: "mock-services"
    metrics_path: /health
    static_configs:
      - targets:
          - "k8s-mock-api:9002"
          - "redis-mock-api:9003"
          - "network-mock-api:9004"

  - job_name: "fake-generator"
    metrics_path: /health
    static_configs:
      - targets: ["fake-data-generator:9005"]
